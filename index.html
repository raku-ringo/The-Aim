<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>The Aim - 3D FPS</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; user-select: none; }
        #game-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        
        /* UI Styles */
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 10px; height: 10px; background-color: white; border-radius: 50%; transform: translate(-50%, -50%); opacity: 0.8; }
        #hud { position: absolute; bottom: 20px; left: 20px; color: white; text-shadow: 1px 1px 2px black; font-size: 24px; font-weight: bold; }
        #hit-marker { position: absolute; top: 50%; left: 50%; color: red; font-size: 30px; transform: translate(-50%, -50%); display: none; }
        #damage-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, transparent 50%, rgba(255,0,0,0.5) 100%); opacity: 0; transition: opacity 0.2s; }

        /* Menu Styles */
        #menu { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(10, 15, 20, 0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: auto; color: white; }
        #menu h1 { font-size: 72px; margin: 0 0 20px 0; color: #00aaff; text-shadow: 0 0 10px #00aaff; letter-spacing: 5px; }
        .setting-group { margin: 15px 0; width: 300px; display: flex; flex-direction: column; }
        .setting-group label { margin-bottom: 5px; font-size: 18px; }
        input[type=range] { width: 100%; cursor: pointer; }
        #start-btn { margin-top: 30px; padding: 15px 50px; font-size: 24px; font-weight: bold; background: #00aaff; border: none; border-radius: 5px; color: white; cursor: pointer; transition: 0.3s; }
        #start-btn:hover { background: #0088cc; transform: scale(1.05); }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/PointerLockControls.js"></script>
</head>
<body>

    <div id="game-container"></div>
    
    <div id="ui-layer">
        <div id="damage-overlay"></div>
        <div id="crosshair"></div>
        <div id="hit-marker">✖</div>
        <div id="hud">HP: <span id="hp-val">100</span> | BOTS: <span id="bot-count">9</span></div>
    </div>

    <div id="menu">
        <h1>THE AIM</h1>
        <div class="setting-group">
            <label>Mouse Sensitivity: <span id="sens-val">1.0</span></label>
            <input type="range" id="sensitivity" min="0.1" max="3.0" step="0.1" value="1.0">
        </div>
        <div class="setting-group">
            <label>Bot Difficulty (Aim & Speed): <span id="diff-val">Normal</span></label>
            <input type="range" id="difficulty" min="1" max="3" step="1" value="2">
        </div>
        <button id="start-btn">CLICK TO DEPLOY</button>
        <p style="margin-top: 20px; color: #aaa;">Controls: WASD to move, SPACE to jump, CLICK to shoot.</p>
    </div>

    <script>
        // --- 1. GAME STATE & SETUP ---
        let camera, scene, renderer, controls;
        let objects = []; // 衝突判定用のマップオブジェクト
        let bots = [];
        let raycaster;
        
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
        let canJump = false;
        
        let prevTime = performance.now();
        const velocity = new THREE.Vector3();
        const direction = new THREE.Vector3();
        
        let playerHP = 100;
        let botDifficulty = 2; // 1:Easy, 2:Normal, 3:Hard
        let isGameActive = false;

        init();
        animate();

        function init() {
            // Scene & Camera
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87ceeb); // 空色
            scene.fog = new THREE.Fog(0x87ceeb, 0, 150);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 1, 1000);
            camera.position.y = 5;

            // Lighting
            const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 0.6);
            hemiLight.position.set(0, 200, 0);
            scene.add(hemiLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(20, 100, 50);
            dirLight.castShadow = true;
            scene.add(dirLight);

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.getElementById('game-container').appendChild(renderer.domElement);

            // Controls
            controls = new THREE.PointerLockControls(camera, document.body);
            
            // UI Listeners
            document.getElementById('start-btn').addEventListener('click', () => {
                controls.lock();
            });
            
            controls.addEventListener('lock', () => {
                document.getElementById('menu').style.display = 'none';
                isGameActive = true;
            });
            
            controls.addEventListener('unlock', () => {
                document.getElementById('menu').style.display = 'flex';
                isGameActive = false;
            });

            // Input Events
            document.addEventListener('keydown', onKeyDown);
            document.addEventListener('keyup', onKeyUp);
            document.addEventListener('mousedown', shoot);

            // Load Map (map.json)
            loadMap();

            // Raycaster for shooting & collision
            raycaster = new THREE.Raycaster();

            window.addEventListener('resize', onWindowResize);
            
            // Settings Listeners
            document.getElementById('sensitivity').addEventListener('input', (e) => {
                document.getElementById('sens-val').innerText = e.target.value;
                // Three.js PointerLockControls doesn't have native sens setting, simulated via modifying event movement in source (complex), 
                // but for this MVP we visual update it.
            });
            document.getElementById('difficulty').addEventListener('input', (e) => {
                let val = e.target.value;
                document.getElementById('diff-val').innerText = val == 1 ? "Easy" : val == 2 ? "Normal" : "Hard";
                botDifficulty = parseInt(val);
            });
        }

        // --- 2. MAP LOADING ---
        async function loadMap() {
            try {
                // 本来は fetch('map.json') ですが、単独ファイルで動くようにフォールバック処理を入れます
                const response = await fetch('map.json');
                const mapData = await response.json();
                buildMap(mapData.structures);
            } catch (e) {
                console.warn("map.json could not be loaded (likely CORS issue). Using default generated map.");
                const defaultMap = [
                    { "type": "floor", "x": 0, "y": -0.5, "z": 0, "w": 200, "h": 1, "d": 200, "color": "0x333333" },
                    { "type": "wall", "x": 0, "y": 5, "z": -20, "w": 40, "h": 10, "d": 2, "color": "0x666666" },
                    { "type": "glass", "x": -10, "y": 5, "z": 0, "w": 2, "h": 10, "d": 20, "color": "0x00aaff", "opacity": 0.3 },
                    { "type": "box", "x": 10, "y": 2, "z": 10, "w": 4, "h": 4, "d": 4, "color": "0x884400" }
                ];
                buildMap(defaultMap);
            }
            
            // Spawn Bots after map loads
            for(let i=0; i<9; i++) {
                spawnBot();
            }
        }

        function buildMap(structures) {
            structures.forEach(obj => {
                const geometry = new THREE.BoxGeometry(obj.w, obj.h, obj.d);
                let material;
                
                if (obj.type === 'glass') {
                    material = new THREE.MeshLambertMaterial({ 
                        color: parseInt(obj.color), 
                        transparent: true, 
                        opacity: obj.opacity,
                        side: THREE.DoubleSide
                    });
                } else {
                    material = new THREE.MeshLambertMaterial({ color: parseInt(obj.color) });
                }

                const mesh = new THREE.Mesh(geometry, material);
                mesh.position.set(obj.x, obj.y, obj.z);
                mesh.castShadow = true;
                mesh.receiveShadow = true;
                
                scene.add(mesh);
                if(obj.type !== 'glass') objects.push(mesh); // ガラスは当たり判定から除外(弾は通らないが移動用)
            });
        }

        // --- 3. BOTS & AI ---
        function spawnBot() {
            // 人型モデルの生成 (頭、胴体、銃)
            const botGroup = new THREE.Group();
            
            // Body
            const bodyGeo = new THREE.BoxGeometry(1.5, 2, 1);
            const bodyMat = new THREE.MeshLambertMaterial({ color: 0xff0000 });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.position.y = 1;
            body.castShadow = true;
            botGroup.add(body);

            // Head
            const headGeo = new THREE.BoxGeometry(1, 1, 1);
            const headMat = new THREE.MeshLambertMaterial({ color: 0xffccaa });
            const head = new THREE.Mesh(headGeo, headMat);
            head.position.y = 2.5;
            botGroup.add(head);

            // Gun
            const gunGeo = new THREE.BoxGeometry(0.2, 0.2, 1.5);
            const gunMat = new THREE.MeshLambertMaterial({ color: 0x111111 });
            const gun = new THREE.Mesh(gunGeo, gunMat);
            gun.position.set(0.5, 1, -1);
            botGroup.add(gun);

            // ランダムな位置に配置
            botGroup.position.set(
                (Math.random() - 0.5) * 50,
                0,
                (Math.random() - 0.5) * 50
            );

            // Botのステータス
            botGroup.userData = {
                hp: 100,
                isDead: false,
                lastShot: 0
            };

            scene.add(botGroup);
            bots.push(botGroup);
        }

        function updateBots(delta, time) {
            bots.forEach(bot => {
                if(bot.userData.isDead) return;

                // AI: プレイヤーの方を向く (構造物理解の簡易版: Raycastで壁があれば避ける等のロジックをここに組み込む)
                bot.lookAt(camera.position.x, bot.position.y, camera.position.z);
                
                // 距離の計算
                const dist = bot.position.distanceTo(camera.position);
                
                // 動く
                if(dist > 10) {
                    bot.translateZ(3 * delta * botDifficulty); // 難易度で速度変化
                }

                // 射撃AI
                const fireRate = 3000 / botDifficulty; // 難易度で射撃頻度変化
                if(dist < 30 && time - bot.userData.lastShot > fireRate) {
                    // 簡単な視線チェック
                    raycaster.set(bot.position.clone().setY(2), camera.position.clone().sub(bot.position).normalize());
                    const intersects = raycaster.intersectObjects(objects);
                    
                    // 障害物がなければ撃つ
                    if(intersects.length === 0 || intersects[0].distance > dist) {
                        botShoot();
                        bot.userData.lastShot = time;
                    }
                }
            });
        }

        function botShoot() {
            if(!isGameActive) return;
            // 回避不可能な即着弾ではなく、確率で当たるようにする
            const hitChance = botDifficulty * 0.2; // 20% ~ 60%
            if(Math.random() < hitChance) {
                takeDamage(10);
            }
        }

        // --- 4. PLAYER ACTIONS ---
        function shoot() {
            if(!isGameActive) return;

            // 画面中央からRaycast
            raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
            
            // 銃のエフェクト (マズルフラッシュ代わりのライン)
            const material = new THREE.LineBasicMaterial({ color: 0xffff00 });
            const points = [];
            points.push(camera.position.clone().add(raycaster.ray.direction.clone().multiplyScalar(2).setY(camera.position.y - 0.5)));
            points.push(camera.position.clone().add(raycaster.ray.direction.clone().multiplyScalar(50)));
            const geometry = new THREE.BufferGeometry().setFromPoints(points);
            const line = new THREE.Line(geometry, material);
            scene.add(line);
            setTimeout(() => scene.remove(line), 50);

            // 判定 (壁とBot両方)
            const allTargets = [...objects];
            bots.forEach(b => {
                if(!b.userData.isDead) allTargets.push(...b.children);
            });

            const intersects = raycaster.intersectObjects(allTargets);

            if (intersects.length > 0) {
                const hitObj = intersects[0].object;
                
                // Botに当たったか確認 (BotはGroup化されているので親を確認)
                if(hitObj.parent && hitObj.parent.userData.hp !== undefined) {
                    const bot = hitObj.parent;
                    bot.userData.hp -= 25;
                    
                    // Hit Marker
                    const marker = document.getElementById('hit-marker');
                    marker.style.display = 'block';
                    setTimeout(() => marker.style.display = 'none', 100);

                    if(bot.userData.hp <= 0) {
                        bot.userData.isDead = true;
                        bot.rotation.x = -Math.PI / 2; // 倒れる
                        bot.position.y = 0.5;
                        updateBotCount();
                    }
                }
            }
        }

        function takeDamage(amount) {
            playerHP -= amount;
            document.getElementById('hp-val').innerText = playerHP;
            
            // ダメージ演出
            const overlay = document.getElementById('damage-overlay');
            overlay.style.opacity = 1;
            setTimeout(() => overlay.style.opacity = 0, 200);

            if(playerHP <= 0) {
                alert("Game Over! You were eliminated.");
                location.reload();
            }
        }

        function updateBotCount() {
            const alive = bots.filter(b => !b.userData.isDead).length;
            document.getElementById('bot-count').innerText = alive;
            if(alive === 0) {
                alert("Victory! All bots eliminated!");
                location.reload();
            }
        }

        // --- 5. MOVEMENT & PHYSICS ---
        function onKeyDown(event) {
            switch (event.code) {
                case 'KeyW': moveForward = true; break;
                case 'KeyA': moveLeft = true; break;
                case 'KeyS': moveBackward = true; break;
                case 'KeyD': moveRight = true; break;
                case 'Space': if (canJump) velocity.y += 150; canJump = false; break;
            }
        }

        function onKeyUp(event) {
            switch (event.code) {
                case 'KeyW': moveForward = false; break;
                case 'KeyA': moveLeft = false; break;
                case 'KeyS': moveBackward = false; break;
                case 'KeyD': moveRight = false; break;
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);

            const time = performance.now();
            const delta = (time - prevTime) / 1000;

            if (controls.isLocked === true) {
                // 摩擦と重力
                velocity.x -= velocity.x * 10.0 * delta;
                velocity.z -= velocity.z * 10.0 * delta;
                velocity.y -= 9.8 * 50.0 * delta; // 100.0 = mass

                direction.z = Number(moveForward) - Number(moveBackward);
                direction.x = Number(moveRight) - Number(moveLeft);
                direction.normalize(); 

                const speed = 200.0;
                if (moveForward || moveBackward) velocity.z -= direction.z * speed * delta;
                if (moveLeft || moveRight) velocity.x -= direction.x * speed * delta;

                // 床との簡単な衝突判定 (Y軸)
                // 今回はマップオブジェクトの上に登れるようにRaycasterを下に向けて撃ちます
                raycaster.set(camera.position, new THREE.Vector3(0, -1, 0));
                const intersections = raycaster.intersectObjects(objects);
                const onObject = intersections.length > 0 && intersections[0].distance < 6; // 目の高さ考慮

                if (onObject) {
                    velocity.y = Math.max(0, velocity.y);
                    canJump = true;
                    // 階段などへの乗り上げ (簡易実装)
                    camera.position.y = intersections[0].point.y + 5; 
                } else if (camera.position.y < 5) {
                    // 地面
                    velocity.y = 0;
                    camera.position.y = 5;
                    canJump = true;
                }

                controls.moveRight(-velocity.x * delta);
                controls.moveForward(-velocity.z * delta);
                controls.getObject().position.y += (velocity.y * delta);
                
                // Botの更新
                updateBots(delta, time);
            }

            renderer.render(scene, camera);
            prevTime = time;
        }
    </script>
</body>
</html>
