<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>The Aim - Ultimate FPS Engine</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Arial', sans-serif; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 20px; height: 20px; border: 2px solid #0f0; border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; }
        #hud { position: absolute; bottom: 30px; left: 30px; color: #0f0; font-family: monospace; font-size: 24px; text-shadow: 2px 2px 0 #000; pointer-events: none; }
        #damage-flash { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: red; opacity: 0; pointer-events: none; transition: opacity 0.1s; }
        #menu { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, #222, #000); display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; text-align: center; }
        #menu h1 { font-size: 100px; margin-bottom: 10px; color: #0af; text-transform: uppercase; letter-spacing: 10px; }
        button { padding: 20px 60px; font-size: 30px; background: #0af; border: none; color: white; cursor: pointer; border-radius: 50px; font-weight: bold; transition: 0.3s; }
        button:hover { background: #0df; transform: scale(1.1); box-shadow: 0 0 30px #0af; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/PointerLockControls.js"></script>
</head>
<body>
    <div id="game-container"></div>
    <div id="crosshair"></div>
    <div id="damage-flash"></div>
    <div id="hud">HP: 100 | ENEMIES: 9</div>
    <div id="menu">
        <h1>The Aim</h1>
        <p>3D URBAN WARFARE SIMULATOR</p>
        <button id="play-btn">START MISSION</button>
    </div>

    <script>
        let scene, camera, renderer, controls, raycaster;
        let objects = []; // 壁・床などの衝突判定用メッシュ
        let bots = [];
        let playerHP = 100;
        let isGameRunning = false;
        
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
        let canJump = false;
        const velocity = new THREE.Vector3();
        const direction = new THREE.Vector3();
        let prevTime = performance.now();

        // 衝突判定用定数
        const PLAYER_RADIUS = 2.0;

        init();
        animate();

        async function init() {
            // Scene Setup
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            scene.fog = new THREE.Fog(0x87CEEB, 0, 800);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
            
            // Lighting
            const ambient = new THREE.AmbientLight(0xffffff, 0.7);
            scene.add(ambient);
            const sun = new THREE.DirectionalLight(0xffffff, 0.8);
            sun.position.set(100, 200, 100);
            scene.add(sun);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.getElementById('game-container').appendChild(renderer.domElement);

            controls = new THREE.PointerLockControls(camera, document.body);
            document.getElementById('play-btn').addEventListener('click', () => controls.lock());
            controls.addEventListener('lock', () => { document.getElementById('menu').style.display = 'none'; isGameRunning = true; });
            controls.addEventListener('unlock', () => { document.getElementById('menu').style.display = 'flex'; isGameRunning = false; });

            raycaster = new THREE.Raycaster();

            // Load Map & Build
            const mapRes = await fetch('map.json');
            const mapData = await mapRes.json();
            buildCity(mapData);

            // Spawn Bots
            for(let i=0; i<9; i++) spawnBot(i);

            // Initial Player Position
            camera.position.set(200, 10, 200);

            window.addEventListener('resize', onWindowResize);
            document.addEventListener('keydown', (e) => handleKey(e.code, true));
            document.addEventListener('keyup', (e) => handleKey(e.code, false));
            document.addEventListener('mousedown', shoot);
        }

        function buildCity(data) {
            // 地面
            const ground = new THREE.Mesh(
                new THREE.PlaneGeometry(2000, 2000),
                new THREE.MeshLambertMaterial({ color: 0x556655 })
            );
            ground.rotation.x = -Math.PI / 2;
            scene.add(ground);
            objects.push(ground);

            data.buildings.forEach(b => {
                createComplexBuilding(b.x, b.z, b.floors, b.w, b.d, b.rooms);
            });
        }

        function createComplexBuilding(x, z, floors, w, d, roomCount) {
            const floorHeight = 10;
            const wallMat = new THREE.MeshLambertMaterial({ color: 0xaaaaaa });
            const floorMat = new THREE.MeshLambertMaterial({ color: 0x666666 });
            const glassMat = new THREE.MeshLambertMaterial({ color: 0x00aaff, transparent: true, opacity: 0.4 });

            for (let f = 0; f < floors; f++) {
                const y = f * floorHeight;
                
                // 床
                const fMesh = new THREE.Mesh(new THREE.BoxGeometry(w, 0.5, d), floorMat);
                fMesh.position.set(x, y, z);
                scene.add(fMesh);
                objects.push(fMesh);

                // 外壁
                const walls = [
                    { px: 0, pz: d/2, sw: w, sd: 1 }, // North
                    { px: 0, pz: -d/2, sw: w, sd: 1 }, // South
                    { px: w/2, pz: 0, sw: 1, sd: d }, // East
                    { px: -w/2, pz: 0, sw: 1, sd: d }  // West
                ];

                walls.forEach((wall, i) => {
                    // 1階にだけ入り口を作る
                    if (f === 0 && i === 0) return; 

                    const wMesh = new THREE.Mesh(new THREE.BoxGeometry(wall.sw, floorHeight, wall.sd), wallMat);
                    wMesh.position.set(x + wall.px, y + floorHeight/2, z + wall.pz);
                    scene.add(wMesh);
                    objects.push(wMesh);
                });

                // 内部の部屋仕切り
                for(let r=0; r<roomCount; r++) {
                    const partition = new THREE.Mesh(new THREE.BoxGeometry(w/2, floorHeight, 1), wallMat);
                    partition.position.set(x + (Math.random()-0.5)*w*0.5, y + floorHeight/2, z + (Math.random()-0.5)*d*0.5);
                    partition.rotation.y = Math.random() > 0.5 ? 0 : Math.PI/2;
                    scene.add(partition);
                    objects.push(partition);
                }

                // 階段 (螺旋状)
                const stepCount = 10;
                for(let s=0; s<stepCount; s++) {
                    const angle = (s / stepCount) * Math.PI * 2;
                    const step = new THREE.Mesh(new THREE.BoxGeometry(5, 1, 5), wallMat);
                    step.position.set(x + Math.cos(angle)*5, y + s, z + Math.sin(angle)*5);
                    scene.add(step);
                    objects.push(step);
                }

                // 屋上
                if (f === floors - 1) {
                    const roof = new THREE.Mesh(new THREE.BoxGeometry(w, 1, d), wallMat);
                    roof.position.set(x, y + floorHeight, z);
                    scene.add(roof);
                    objects.push(roof);
                }
            }
        }

        function spawnBot(id) {
            const bot = new THREE.Group();
            
            // 人型モデル作成 (青色成人男性)
            const mat = new THREE.MeshLambertMaterial({ color: 0x0000ff });
            const torso = new THREE.Mesh(new THREE.BoxGeometry(2, 4, 1), mat); torso.position.y = 4;
            const head = new THREE.Mesh(new THREE.BoxGeometry(1.2, 1.2, 1.2), mat); head.position.y = 6.5;
            const armL = new THREE.Mesh(new THREE.BoxGeometry(0.8, 4, 0.8), mat); armL.position.set(-1.5, 4, 0);
            const armR = new THREE.Mesh(new THREE.BoxGeometry(0.8, 4, 0.8), mat); armR.position.set(1.5, 4, 0);
            const legL = new THREE.Mesh(new THREE.BoxGeometry(0.9, 4, 0.9), mat); legL.position.set(-0.5, 1, 0);
            const legR = new THREE.Mesh(new THREE.BoxGeometry(0.9, 4, 0.9), mat); legR.position.set(0.5, 1, 0);
            
            // 銃
            const gun = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.4, 3), new THREE.MeshLambertMaterial({color: 0x111111}));
            gun.position.set(1.5, 4.5, 1.5);
            
            bot.add(torso, head, armL, armR, legL, legR, gun);
            
            // 建物の中にランダムスポーン
            bot.position.set((Math.random()-0.5)*400, 2, (Math.random()-0.5)*400);
            bot.userData = { hp: 100, lastShot: 0, state: 'hunt' };
            
            scene.add(bot);
            bots.push(bot);
        }

        // --- 衝突判定システム ---
        function checkCollision(pos, radius) {
            const directions = [
                new THREE.Vector3(1, 0, 0), new THREE.Vector3(-1, 0, 0),
                new THREE.Vector3(0, 0, 1), new THREE.Vector3(0, 0, -1),
                new THREE.Vector3(0, -1, 0), new THREE.Vector3(0, 1, 0)
            ];
            
            for (let d of directions) {
                raycaster.set(pos, d);
                const intersects = raycaster.intersectObjects(objects);
                if (intersects.length > 0 && intersects[0].distance < radius) {
                    return intersects[0];
                }
            }
            return null;
        }

        function animate() {
            requestAnimationFrame(animate);
            if (!isGameRunning) return;

            const time = performance.now();
            const delta = (time - prevTime) / 1000;

            // プレイヤーの移動
            velocity.x -= velocity.x * 10.0 * delta;
            velocity.z -= velocity.z * 10.0 * delta;
            velocity.y -= 9.8 * 50.0 * delta; 

            direction.z = Number(moveForward) - Number(moveBackward);
            direction.x = Number(moveRight) - Number(moveLeft);
            direction.normalize();

            if (moveForward || moveBackward) velocity.z -= direction.z * 400.0 * delta;
            if (moveLeft || moveRight) velocity.x -= direction.x * 400.0 * delta;

            // 壁と床の当たり判定を適用
            const nextPos = camera.position.clone();
            nextPos.x += -velocity.x * delta;
            nextPos.z += -velocity.z * delta;

            // 水平方向の衝突
            if (!checkCollision(nextPos, PLAYER_RADIUS)) {
                controls.moveRight(-velocity.x * delta);
                controls.moveForward(-velocity.z * delta);
            }

            // 垂直方向 (地面・階段・天井)
            camera.position.y += (velocity.y * delta);
            const groundHit = checkCollision(camera.position, 5.0); // 目の高さ分
            if (groundHit && velocity.y < 0) {
                velocity.y = 0;
                camera.position.y = groundHit.point.y + 5.0;
                canJump = true;
            }

            if (camera.position.y < -10) camera.position.set(0, 50, 0); // 落下救済

            updateBots(time, delta);
            prevTime = time;
            renderer.render(scene, camera);
        }

        function updateBots(time, delta) {
            bots.forEach(bot => {
                if (bot.userData.hp <= 0) return;

                const dist = bot.position.distanceTo(camera.position);
                
                // AIロジック: プレイヤーを追跡・攻撃
                if (dist < 200) {
                    bot.lookAt(camera.position.x, bot.position.y, camera.position.z);
                    
                    // 適度に近づく
                    if (dist > 30) {
                        bot.translateZ(15 * delta);
                    }

                    // 射撃
                    if (time - bot.userData.lastShot > 1000) {
                        botShoot(bot);
                        bot.userData.lastShot = time;
                    }
                }
            });
        }

        function botShoot(bot) {
            // プレイヤーへのヒット判定 (簡易的な確率)
            if (Math.random() > 0.7) {
                playerHP -= 10;
                document.getElementById('hud').innerText = `HP: ${playerHP} | ENEMIES: ${bots.filter(b=>b.userData.hp>0).length}`;
                document.getElementById('damage-flash').style.opacity = 0.5;
                setTimeout(() => document.getElementById('damage-flash').style.opacity = 0, 100);
                
                if (playerHP <= 0) {
                    alert("Eliminated in action.");
                    location.reload();
                }
            }
        }

        function shoot() {
            if (!isGameRunning) return;
            
            raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
            const hitBots = bots.filter(b => b.userData.hp > 0);
            
            // ボットの全部品を判定対象に
            let allBotParts = [];
            hitBots.forEach(b => allBotParts.push(...b.children));
            
            const intersects = raycaster.intersectObjects(allBotParts);
            
            if (intersects.length > 0) {
                const hitPart = intersects[0].object;
                const targetBot = hitPart.parent;
                targetBot.userData.hp -= 40;
                
                if (targetBot.userData.hp <= 0) {
                    targetBot.rotation.x = Math.PI / 2;
                    targetBot.position.y = 1;
                    document.getElementById('hud').innerText = `HP: ${playerHP} | ENEMIES: ${bots.filter(b=>b.userData.hp>0).length}`;
                }
            }
        }

        function handleKey(code, isDown) {
            switch (code) {
                case 'KeyW': moveForward = isDown; break;
                case 'KeyS': moveBackward = isDown; break;
                case 'KeyA': moveLeft = isDown; break;
                case 'KeyD': moveRight = isDown; break;
                case 'Space': if (isDown && canJump) { velocity.y += 150; canJump = false; } break;
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>
</body>
</html>
